# spring.application.name=student-api
# Configuración de la base de datos H2
spring.datasource.url=jdbc:h2:mem:studentdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Mostrar consola H2 en navegador
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Configuración de JPA (manejo de entidades)
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Puerto (opcional)
server.port=8080

# 🔎 ¿Qué significa esto?
# H2 en memoria: No necesitas instalar nada. Se crea la BD temporalmente cada vez que ejecutas tu app.
# /h2-console: Puedes ver la base de datos en tu navegador.
# spring.jpa.hibernate.ddl-auto=update: Spring crea automáticamente la tabla Student basada en tu clase Java.
